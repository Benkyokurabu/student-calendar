name: Rclone Token Expiry Reminder

on:
  schedule:
    # 毎日 20:00 UTC = 05:00 JST（パイプラインの後）
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check token age
        id: check
        run: |
          updated=$(cat rclone_token_updated.txt 2>/dev/null || echo "2026-04-22")
          updated_epoch=$(date -d "$updated" +%s)
          now_epoch=$(date +%s)
          days=$(( (now_epoch - updated_epoch) / 86400 ))
          echo "Token updated: $updated ($days days ago)"
          echo "days=$days" >> "$GITHUB_OUTPUT"
          echo "updated=$updated" >> "$GITHUB_OUTPUT"
          if [ "$days" -ge 75 ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create reminder issue
        if: steps.check.outputs.send == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 既に同じタイトルのオープンIssueがあればスキップ
          existing=$(gh issue list --state open --search "rcloneトークンの更新" --json number --jq 'length')
          if [ "$existing" -gt "0" ]; then
            echo "Reminder issue already exists, skipping"
            exit 0
          fi

          gh issue create \
            --title "【要対応】rcloneトークンの更新が必要です（${{ steps.check.outputs.days }}日経過）" \
            --body "$(cat <<'BODY'
          rcloneのOneDriveトークンが **${{ steps.check.outputs.days }}日** 経過しています。
          前回更新: ${{ steps.check.outputs.updated }}
          90日で失効するため、早めに更新してください。

          ## 更新手順
          1. PCでコマンドプロンプトを開く
          2. 以下を実行:
             ```
             rclone config reconnect onedrive:
             ```
          3. ブラウザが開くのでMicrosoftアカウントでログイン
          4. 認証完了後、以下を実行してBase64を取得:
             ```
             powershell -Command "[Convert]::ToBase64String([IO.File]::ReadAllBytes((Join-Path $env:APPDATA 'rclone\rclone.conf')))"
             ```
          5. [GitHub Secrets](https://github.com/Benkyokurabu/student-calendar/settings/secrets/actions) を開き、`RCLONE_CONF_B64` を上記の出力で上書き
          6. リポの `rclone_token_updated.txt` を今日の日付に更新して commit & push
          7. このIssueをクローズ
          BODY
          )"
